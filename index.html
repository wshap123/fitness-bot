<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1610" />
  <title>Bennie — Will’s fitness coach</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #faf8f4;
      --linen: #f4f0e8;
      --sand: #ede6d8;
      --tan: #e6ddd0;
      --tan-deep: #d5c9b6;
      --warm-grey: #a89f94;
      --warm-grey-deep: #8c8378;
      --espresso: #1e1610;
      --espresso-mid: #2e2318;
      --espresso-soft: #3d3028;
      --ink: #1e1810;
      --ink-muted: #7a6f65;
      --border: #ddd5c5;
      --border-soft: #e8e2d6;
      --header-bg: #1e1610;
      --header-text: #f8f4ee;
      --header-text-dim: rgba(248, 244, 238, 0.55);
      --header-surface: #2e2318;
      --header-surface-border: #4a3e32;
      --shadow-soft: rgba(30, 22, 16, 0.06);
      --shadow-card: rgba(30, 22, 16, 0.10);
      --shadow-medium: rgba(30, 22, 16, 0.14);
      --accent-gold: #c9a96e;
      --accent-gold-dim: rgba(201, 169, 110, 0.15);
      --danger: #9c4c3d;
      --danger-bg: #faf0ee;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-lg: 22px;
      --font: "DM Sans", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    button,
    a,
    input,
    textarea,
    .icon-btn,
    .send,
    .btn,
    .bottom-tab {
      transition: all 0.15s ease;
    }

    .app {
      height: 100%;
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(64px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
    }

    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: var(--header-bg);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-family: "DM Serif Display", serif;
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--header-text);
    }

    .brand p {
      margin: 0;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--header-text-dim);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .week-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: flex-end;
    }

    .week-field label {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--header-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .week-field input {
      width: 52px;
      padding: 6px 8px;
      border-radius: 12px;
      border: 1px solid var(--header-surface-border);
      background: var(--header-surface);
      color: var(--header-text);
      font-size: 16px;
      text-align: center;
    }

    .icon-btn {
      border: 1px solid var(--header-surface-border);
      background: var(--header-surface);
      color: var(--header-text);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .icon-btn:active {
      transform: scale(0.97);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px calc(16px + 64px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
      background: var(--cream);
    }

    .row {
      display: flex;
      width: 100%;
    }

    .row.user {
      justify-content: flex-end;
    }

    .row.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(88%, 380px);
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .row.user .bubble {
      background: var(--accent-gold);
      border: none;
      color: #1e1610;
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 2px 12px var(--shadow-soft);
    }

    .row.assistant .bubble {
      background: var(--tan);
      border: 1px solid var(--border);
      color: var(--ink);
      border-radius: 18px 18px 18px 4px;
      box-shadow: 0 2px 8px var(--shadow-soft);
    }

    .meta {
      font-size: 0.7rem;
      color: var(--ink-muted);
      padding: 0 4px;
      margin-top: -4px;
    }

    .row.user + .meta {
      text-align: right;
    }

    .composer {
      flex-shrink: 0;
      padding: 12px 14px 12px;
      border-top: 1px solid var(--border);
      background: var(--cream);
      backdrop-filter: blur(16px);
    }

    .composer-inner {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 6px 6px 6px 14px;
      box-shadow: 0 2px 12px var(--shadow-soft);
    }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--ink);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      padding: 8px 0;
    }

    textarea::placeholder {
      color: var(--ink-muted);
      opacity: 0.72;
    }

    textarea:focus {
      outline: none;
    }

    .send {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(201, 169, 110, 0.4);
      background: var(--espresso);
      color: var(--header-text);
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 14px var(--shadow-medium);
    }

    .send:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .typing {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 4px 2px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-gold);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .bottom-tab-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      max-width: 520px;
      margin: 0 auto;
      height: calc(64px + env(safe-area-inset-bottom));
      padding: 0 env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: flex;
      background: var(--cream);
      border-top: 1px solid var(--border);
    }

    .bottom-tab {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 64px;
      text-decoration: none;
      color: var(--warm-grey);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .bottom-tab.active {
      color: var(--espresso);
    }

    .bottom-tab.active::before {
      content: "";
      position: absolute;
      top: 8px;
      width: 4px;
      height: 3px;
      border-radius: 2px;
      background: var(--accent-gold);
    }

    .bottom-tab-icon {
      font-size: 1.2rem;
      line-height: 1;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(152px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(12px);
      background: rgba(30, 22, 16, 0.92);
      color: var(--header-text);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.85rem;
      font-weight: 500;
      max-width: min(90%, 360px);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 50;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px var(--shadow-medium);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      color: var(--danger);
      border-color: #d4b8b0;
      background: rgba(250, 240, 238, 0.95);
    }

    dialog {
      border: none;
      border-radius: var(--radius-lg);
      padding: 0;
      background: var(--cream);
      color: var(--ink);
      width: min(92vw, 400px);
      box-shadow: 0 24px 60px var(--shadow-medium);
      border: 1px solid var(--border);
    }

    dialog::backdrop {
      background: rgba(30, 22, 16, 0.35);
    }

    .modal-body {
      padding: 20px 20px 14px;
    }

    .modal-body h2 {
      margin: 0 0 8px;
      font-size: 1.05rem;
      font-weight: 600;
    }

    .modal-body p {
      margin: 0 0 12px;
      font-size: 0.85rem;
      color: var(--ink-muted);
      line-height: 1.5;
    }

    .modal-body input[type="password"],
    .modal-body input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      font-size: 16px;
      margin-bottom: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      padding: 0 20px 18px;
    }

    .btn {
      border-radius: 20px;
      padding: 8px 14px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--sand);
      color: var(--ink);
      cursor: pointer;
      font-size: 0.85rem;
    }

    .btn.primary {
      background: var(--espresso);
      border: none;
      color: var(--header-text);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <h1>Bennie</h1>
        <p>Will’s fitness coach</p>
      </div>
      <div class="header-actions">
        <div class="week-field">
          <label for="weekInput">Week</label>
          <input id="weekInput" type="number" min="1" step="1" value="1" inputmode="numeric" />
        </div>
        <button type="button" class="icon-btn" id="settingsBtn" title="API key">⚙</button>
      </div>
    </header>

    <div class="messages" id="messages" aria-live="polite"></div>

    <form class="composer" id="composer">
      <div class="composer-inner">
        <textarea id="input" rows="1" placeholder="Message Bennie…" autocomplete="off"></textarea>
        <button type="submit" class="send" id="sendBtn" aria-label="Send">➤</button>
      </div>
    </form>
  </div>

  <nav class="bottom-tab-bar" aria-label="Main navigation">
    <a href="index.html" class="bottom-tab active" aria-current="page">
      <span class="bottom-tab-icon" aria-hidden="true">💬</span>
      <span class="bottom-tab-label">Chat</span>
    </a>
    <a href="dashboard.html" class="bottom-tab">
      <span class="bottom-tab-icon" aria-hidden="true">📊</span>
      <span class="bottom-tab-label">Dashboard</span>
    </a>
  </nav>

  <div class="toast" id="toast" role="status"></div>

  <dialog id="settingsDialog">
    <div class="modal-body">
      <h2>Anthropic API key</h2>
      <p>Stored only in this browser (localStorage). Never shared with a server except Anthropic’s API from your device.</p>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-api…" autocomplete="off" />
    </div>
    <div class="modal-actions">
      <button type="button" class="btn" id="cancelSettings">Cancel</button>
      <button type="button" class="btn primary" id="saveSettings">Save</button>
    </div>
  </dialog>

  <script>
    const ANTHROPIC_MODEL = "claude-sonnet-4-5";
    const SUPABASE_URL = "https://bhtuxfvnvcjivkuhubfr.supabase.co";
    const SUPABASE_ANON =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJodHV4ZnZudmNqaXZrdWh1YmZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNjk3NzksImV4cCI6MjA5Mzg0NTc3OX0.aya7us9oNmFPbxqPAN2-yv5xBFi24SB1ND7bHdfw2gI";

    const SYSTEM_PROMPT = `You are Bennie, Will's personal fitness coach. You know his exact workout 
program:

MONDAY - Lower Body Power:
Strength: Tonal Squat 3x3-5 (heavy), KB RDL 3x6-8, Hip Thrust 3x8-10
MetCon: 8 min AMRAP - KB Swing x15, DB Goblet Squat Pulse x12, 
DB Bulgarian Split Squat x8/leg, Goblet Squat x12
Cardio: 25 min Zone 2 run

TUESDAY - Run + LeoMoves:
Zone 2 easy aerobic run 25-30 min, LeoMoves mobility work

WEDNESDAY - Upper Push/Pull:
Strength: DB Bench Press 3x4-6, Pull-Ups 3x Fail-2, DB OHP 3x6-8
MetCon: 8 min AMRAP - Tonal Face Pull x15, DB Lateral Raise x12, 
DB Hammer Curl x12, Tonal Row x10
Cardio: 25 min Intervals (1 min hard / 2 min easy x8)

THURSDAY - Run + LeoMoves:
Intervals run - push effort, LeoMoves mobility work

FRIDAY - Full Body Functional:
Strength: KB Deadlift 3x4-6, Weighted Pull-Ups 3x4-6, DB Bench 3x6-8
MetCon: 10 min AMRAP - Tonal Hip Thrust x10, KB Clean & Press x5/side, 
KB Swing x15, Plank-to-Push-Up x10
Cardio: 20-30 min Zone 2 or easy run

SATURDAY - Pilates (active recovery, core, flexibility)

SUNDAY - Long Run + LeoMoves (easy pace, build distance)

WEEK 4 IS ALWAYS DELOAD: same weight, drop to 2 sets, MetCon 1 round only.

When Will tells you what workout he completed, extract: exercise name, 
sets, reps, weight in lbs, and any notes. Confirm back what you logged. 
Be encouraging but concise. When asked what today's workout is, check 
the day and give him the full workout step by step. You're texting someone you've coached for a while — keep it casual and familiar, no formal intros. Your name is Bennie if it comes up naturally.

You have a tool named log_workout_entry. Whenever Will reports completed work with enough detail to log (exercise plus any of sets, reps, weight, or notes), you MUST call log_workout_entry once per exercise. Use the training week and calendar context provided in the bracketed prefix of Will's messages. If week is unknown, use the configured training week from that prefix. For day, use the calendar day name from that prefix unless Will explicitly says otherwise. Coerce numeric fields when possible; use null for unknown numbers. Put qualitative rep schemes (e.g. AMRAP rounds) in notes if they do not map to reps.`;

    const LOG_TOOL = {
      name: "log_workout_entry",
      description:
        "Insert one row into Will's workout_logs table in Supabase. Call once per distinct exercise logged.",
      input_schema: {
        type: "object",
        properties: {
          day: {
            type: "string",
            description: "Calendar day name, e.g. Monday",
          },
          week: {
            type: "integer",
            description: "Training week number (positive integer)",
          },
          exercise: {
            type: "string",
            description: "Exercise name",
          },
          sets: {
            type: "integer",
            description: "Number of sets completed (omit if unknown)",
          },
          reps: {
            type: "string",
            description: "Reps as text (ranges, AMRAP totals, etc.); omit if unknown",
          },
          weight_lbs: {
            type: "number",
            description: "Weight in pounds if applicable; omit if unknown or bodyweight",
          },
          notes: {
            type: "string",
            description: "Other notes (effort, substitutions, pain, etc.)",
          },
        },
        required: ["exercise", "day", "week"],
      },
    };

    const messagesEl = document.getElementById("messages");
    const composer = document.getElementById("composer");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const toastEl = document.getElementById("toast");
    const weekInput = document.getElementById("weekInput");
    const settingsBtn = document.getElementById("settingsBtn");
    const settingsDialog = document.getElementById("settingsDialog");
    const apiKeyInput = document.getElementById("apiKeyInput");
    const saveSettings = document.getElementById("saveSettings");
    const cancelSettings = document.getElementById("cancelSettings");

    const STORAGE_KEY = "anthropic_api_key";
    const WEEK_KEY = "training_week";
    const PENDING_MSG_KEY = "pending_chat_message";

    function loadWeek() {
      const v = localStorage.getItem(WEEK_KEY);
      if (v != null && v !== "") weekInput.value = String(Math.max(1, parseInt(v, 10) || 1));
    }

    function saveWeek() {
      const n = Math.max(1, parseInt(weekInput.value, 10) || 1);
      weekInput.value = String(n);
      localStorage.setItem(WEEK_KEY, String(n));
    }

    function getApiKey() {
      return localStorage.getItem(STORAGE_KEY) || "";
    }

    function showToast(text, isError) {
      toastEl.textContent = text;
      toastEl.classList.toggle("error", !!isError);
      toastEl.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove("show"), 3200);
    }

    /** @type {{ role: string, content: unknown }[]} */
    let apiHistory = [];

    function appendBubble(role, text) {
      const row = document.createElement("div");
      row.className = `row ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendTyping() {
      const row = document.createElement("div");
      row.className = "row assistant";
      row.id = "typingRow";
      const bubble = document.createElement("div");
      bubble.className = "bubble typing";
      bubble.innerHTML = "<span></span><span></span><span></span>";
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      document.getElementById("typingRow")?.remove();
    }

    function formatContextPrefix() {
      const now = new Date();
      const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      const dayName = days[now.getDay()];
      const iso = now.toISOString().slice(0, 10);
      const week = Math.max(1, parseInt(weekInput.value, 10) || 1);
      return `[Calendar: ${dayName} ${iso}. Configured training week: ${week}.]\n\n`;
    }

    async function insertWorkoutLog(row) {
      const payload = {
        day: row.day,
        week: row.week,
        exercise: row.exercise,
        sets: row.sets ?? null,
        reps: row.reps ?? null,
        weight_lbs: row.weight_lbs ?? null,
        notes: row.notes ?? null,
      };
      const res = await fetch(`${SUPABASE_URL}/rest/v1/workout_logs`, {
        method: "POST",
        headers: {
          apikey: SUPABASE_ANON,
          Authorization: `Bearer ${SUPABASE_ANON}`,
          "Content-Type": "application/json",
          Prefer: "return=minimal",
        },
        body: JSON.stringify(payload),
      });
      if (!res.ok) {
        const errText = await res.text().catch(() => "");
        throw new Error(errText || `Supabase error ${res.status}`);
      }
    }

    async function callAnthropic(apiKey, body) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg = data.error?.message || JSON.stringify(data) || res.statusText;
        throw new Error(msg);
      }
      return data;
    }

    function extractTextBlocks(content) {
      if (!Array.isArray(content)) return "";
      return content
        .filter((b) => b.type === "text")
        .map((b) => b.text)
        .join("\n\n")
        .trim();
    }

    /**
     * Run assistant turn(s) with tool loop; append visible assistant text bubbles.
     */
    async function runAssistantTurn(apiKey) {
      let safety = 0;
      while (safety++ < 12) {
        const data = await callAnthropic(apiKey, {
          model: ANTHROPIC_MODEL,
          max_tokens: 4096,
          system: SYSTEM_PROMPT,
          tools: [LOG_TOOL],
          messages: apiHistory,
        });

        apiHistory.push({ role: "assistant", content: data.content });

        const text = extractTextBlocks(data.content);
        if (text) appendBubble("assistant", text);

        const toolUses = (data.content || []).filter((b) => b.type === "tool_use");
        if (!toolUses.length) break;

        const toolResults = [];
        for (const tu of toolUses) {
          let resultPayload;
          try {
            const input = tu.input || {};
            const sets =
              input.sets === undefined || input.sets === null || input.sets === ""
                ? null
                : Number.parseInt(String(input.sets), 10);
            await insertWorkoutLog({
              day: input.day,
              week: input.week,
              exercise: input.exercise,
              sets: Number.isFinite(sets) ? sets : null,
              reps: input.reps != null && input.reps !== "" ? String(input.reps) : null,
              weight_lbs: (() => {
                if (
                  input.weight_lbs === undefined ||
                  input.weight_lbs === null ||
                  input.weight_lbs === ""
                ) {
                  return null;
                }
                const n = Number(input.weight_lbs);
                return Number.isFinite(n) ? n : null;
              })(),
              notes: input.notes != null && input.notes !== "" ? String(input.notes) : null,
            });
            resultPayload = { ok: true, logged: input };
          } catch (e) {
            resultPayload = { ok: false, error: String(e && e.message ? e.message : e) };
            showToast("Could not save to Supabase: " + resultPayload.error, true);
          }
          toolResults.push({
            type: "tool_result",
            tool_use_id: tu.id,
            content: JSON.stringify(resultPayload),
          });
        }

        apiHistory.push({ role: "user", content: toolResults });
      }
    }

    composer.addEventListener("submit", async (e) => {
      e.preventDefault();
      const apiKey = getApiKey().trim();
      if (!apiKey) {
        settingsDialog.showModal();
        showToast("Add your Anthropic API key in settings.", true);
        return;
      }

      const raw = input.value.trim();
      if (!raw) return;

      saveWeek();
      input.value = "";
      input.style.height = "auto";

      const userVisible = raw;
      const userForModel = formatContextPrefix() + raw;

      appendBubble("user", userVisible);
      apiHistory.push({ role: "user", content: userForModel });

      sendBtn.disabled = true;
      appendTyping();
      try {
        await runAssistantTurn(apiKey);
      } catch (err) {
        showToast(String(err && err.message ? err.message : err), true);
        appendBubble("assistant", "Something went wrong reaching Bennie. Check your API key and network, then try again.");
      } finally {
        removeTyping();
        sendBtn.disabled = false;
        input.focus();
      }
    });

    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });

    settingsBtn.addEventListener("click", () => {
      apiKeyInput.value = getApiKey();
      settingsDialog.showModal();
      apiKeyInput.focus();
    });

    saveSettings.addEventListener("click", () => {
      localStorage.setItem(STORAGE_KEY, apiKeyInput.value.trim());
      settingsDialog.close();
      showToast("API key saved in this browser.");
    });

    cancelSettings.addEventListener("click", () => settingsDialog.close());

    weekInput.addEventListener("change", saveWeek);

    function loadPendingMessage() {
      const params = new URLSearchParams(window.location.search);
      const fromUrl = params.get("msg");
      let pending = fromUrl != null ? fromUrl : localStorage.getItem(PENDING_MSG_KEY);
      if (!pending) return;
      if (fromUrl == null) localStorage.removeItem(PENDING_MSG_KEY);
      input.value = pending;
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    }

    loadWeek();
    loadPendingMessage();
    const openers = [
      "Hey — what's the move today?",
      "Yo, ready to work?",
      "Morning — what are we hitting?",
      "Alright, what's on deck?",
    ];
    appendBubble(
      "assistant",
      `${openers[Math.floor(Math.random() * openers.length)]}\n\nLog whatever you got done, ask for today's plan, whatever. Anthropic key's under ⚙ if you need it — stays in this browser only.`
    );

    if (!getApiKey()) {
      setTimeout(() => settingsDialog.showModal(), 400);
    }
  </script>
</body>
</html>
