<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1e1610" />
  <title>Bennie — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #faf8f4;
      --linen: #f4f0e8;
      --sand: #ede6d8;
      --tan: #e6ddd0;
      --tan-deep: #d5c9b6;
      --warm-grey: #a89f94;
      --warm-grey-deep: #8c8378;
      --espresso: #1e1610;
      --espresso-mid: #2e2318;
      --espresso-soft: #3d3028;
      --ink: #1e1810;
      --ink-muted: #7a6f65;
      --border: #ddd5c5;
      --border-soft: #e8e2d6;
      --header-bg: #1e1610;
      --header-text: #f8f4ee;
      --header-text-dim: rgba(248, 244, 238, 0.55);
      --header-surface: #2e2318;
      --header-surface-border: #4a3e32;
      --shadow-soft: rgba(30, 22, 16, 0.06);
      --shadow-card: rgba(30, 22, 16, 0.10);
      --shadow-medium: rgba(30, 22, 16, 0.14);
      --accent-gold: #c9a96e;
      --accent-gold-dim: rgba(201, 169, 110, 0.15);
      --danger: #9c4c3d;
      --danger-bg: #faf0ee;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-lg: 22px;
      --font: "DM Sans", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    button,
    a,
    input,
    textarea,
    .header-link,
    .btn,
    .tab,
    .bottom-tab,
    .day-card,
    .history-row {
      transition: all 0.15s ease;
    }

    .app {
      height: 100%;
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(64px + env(safe-area-inset-bottom)) env(safe-area-inset-left);
    }

    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: var(--header-bg);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-family: "DM Serif Display", serif;
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--header-text);
    }

    .brand p {
      margin: 0;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--header-text-dim);
    }

    .header-link {
      flex-shrink: 0;
      color: var(--header-text);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 12px;
      border: 1px solid var(--header-surface-border);
      background: var(--header-surface);
    }

    .header-link:active {
      transform: scale(0.98);
    }

    .tabs {
      flex-shrink: 0;
      display: flex;
      gap: 4px;
      margin: 12px 12px 0;
      padding: 4px;
      border-radius: 12px;
      background: var(--sand);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab {
      flex: 1;
      min-width: 72px;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      font-size: 0.82rem;
      font-weight: 500;
      padding: 8px 6px;
      border-radius: 9px;
      cursor: pointer;
      white-space: nowrap;
    }

    .tab.active {
      background: #fff;
      color: var(--espresso);
      box-shadow: 0 1px 4px rgba(30, 22, 16, 0.08);
      border: none;
      outline: none;
    }

    .tab:focus,
    .tab:focus-visible {
      outline: none;
    }

    .tab.active:focus,
    .tab.active:focus-visible {
      box-shadow: 0 1px 4px rgba(30, 22, 16, 0.08);
    }

    .panels {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: var(--cream);
    }

    .panel {
      display: none;
      flex-direction: column;
      height: 100%;
      min-height: 0;
      padding: 12px;
      padding-bottom: calc(12px + 64px + env(safe-area-inset-bottom));
      overflow: hidden;
    }

    .panel.active {
      display: flex;
    }

    .panel-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .panel-loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 28px 12px;
      color: var(--ink-muted);
      font-size: 0.9rem;
    }

    .panel.loading .panel-loading {
      display: flex;
    }

    .panel.loading .panel-body {
      display: none;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--accent-gold-dim);
      border-top-color: var(--accent-gold);
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .week-label {
      margin: 0 0 8px;
      padding: 0;
      font-size: 0.8rem;
      font-weight: 500;
      color: #a89f94;
      letter-spacing: 0.02em;
    }

    .day-card {
      background: #fff;
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 8px;
      box-shadow: 0 1px 6px rgba(30, 22, 16, 0.06);
    }

    .day-card.is-default {
      background: #fff;
      border-color: var(--border-soft);
    }

    .day-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0;
      margin: 0;
    }

    .day-card-tools {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .day-title {
      margin: 0;
      font-family: "DM Serif Display", serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--ink);
    }

    .day-sub {
      margin: 0 0 10px;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--ink-muted);
    }

    .day-edit-btn {
      border: none;
      background: transparent;
      color: var(--accent-gold);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      font-size: 0.68rem;
      font-weight: 500;
      color: #c9a96e;
      background: #fdf5e8;
      border: 1px solid rgba(201, 169, 110, 0.3);
      border-radius: 20px;
      padding: 2px 8px;
      flex-shrink: 0;
    }

    .schedule-blocks {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .schedule-block + .schedule-block {
      border-top: 1px solid var(--border-soft);
      margin: 8px 0 0;
    }

    .schedule-block-label {
      margin: 0 0 4px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .schedule-block:not(:first-child) .schedule-block-label {
      margin-top: 8px;
    }

    .schedule-grid {
      display: grid;
      grid-template-columns: 1fr 44px 56px 68px;
      align-items: center;
    }

    .schedule-grid-header {
      padding-bottom: 3px;
      border-bottom: 1px solid var(--border-soft);
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--warm-grey);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .schedule-grid-header span:nth-child(2),
    .schedule-grid-header span:nth-child(3),
    .schedule-grid-header span:nth-child(4) {
      text-align: center;
    }

    .schedule-exercise-row {
      padding: 5px 0;
      border-bottom: 1px solid var(--border-soft);
    }

    .schedule-exercise-row:last-child {
      border-bottom: none;
    }

    .schedule-col-name {
      min-width: 0;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--ink);
    }

    .schedule-col-sets,
    .schedule-col-reps,
    .schedule-col-weight {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--ink-muted);
      text-align: center;
    }

    .card-notes {
      margin: 8px 0 0;
      font-size: 0.82rem;
      font-weight: 400;
      line-height: 1.5;
      color: var(--ink-muted);
    }

    .day-card .field {
      margin-bottom: 6px;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .history-toolbar {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--cream);
      padding-bottom: 8px;
      margin-bottom: 8px;
    }

    .history-group {
      margin-bottom: 12px;
    }

    .history-day-header {
      margin: 0;
      padding: 12px 4px 6px;
      border-bottom: 1px solid var(--border-soft);
      font-family: "DM Serif Display", serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--ink);
    }

    .history-col-header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 48px 64px 72px;
      gap: 8px;
      padding-bottom: 4px;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .history-col-header span:nth-child(2),
    .history-col-header span:nth-child(3) {
      text-align: center;
    }

    .history-col-header span:nth-child(4) {
      text-align: right;
    }

    .history-row-line {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border-soft);
    }

    .history-group .history-row-line:last-child {
      border-bottom: none;
    }

    .history-data-grid {
      flex: 1;
      min-width: 0;
      display: grid;
      grid-template-columns: 1fr 48px 64px 72px;
      gap: 8px;
      align-items: center;
    }

    .history-col-exercise {
      min-width: 0;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--ink);
    }

    .history-col-sets,
    .history-col-reps {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--ink-muted);
      text-align: center;
    }

    .history-col-weight {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--ink-muted);
      text-align: right;
    }

    .history-edit-link {
      flex-shrink: 0;
      border: none;
      background: transparent;
      color: var(--accent-gold);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      padding: 0;
    }

    .history-row {
      padding: 7px 0;
      border-bottom: 1px solid var(--border-soft);
    }

    .history-group .history-row:last-child {
      border-bottom: none;
    }

    .history-row-form {
      padding-top: 6px;
    }

    .field {
      margin-bottom: 8px;
    }

    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-muted);
      margin-bottom: 4px;
    }

    .field input,
    .field textarea,
    .search-input,
    .upload-message {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      font-size: 16px;
      font-family: inherit;
      line-height: 1.4;
    }

    .field textarea {
      resize: vertical;
      min-height: 72px;
    }

    .upload-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .upload-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .upload-message {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      font-family: var(--font);
      font-size: 0.9rem;
      line-height: 1.5;
      resize: vertical;
    }

    .send-to-bennie {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: var(--espresso);
      color: var(--header-text);
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    .file-meta {
      margin: 0;
      font-size: 0.82rem;
      color: var(--ink-muted);
      text-align: center;
    }

    .btn {
      border-radius: 20px;
      padding: 5px 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--sand);
      color: var(--ink);
      cursor: pointer;
      font-size: 0.78rem;
    }

    .btn.primary {
      background: var(--espresso);
      border: none;
      color: var(--header-text);
      box-shadow: none;
    }

    .btn.ghost {
      background: transparent;
      border: none;
      color: var(--ink-muted);
    }

    .btn.danger {
      color: var(--danger);
      border: 1px solid #d4b8b0;
      background: var(--danger-bg);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .empty {
      text-align: center;
      color: var(--ink-muted);
      font-size: 0.9rem;
      padding: 16px 8px;
    }

    .dropzone {
      display: block;
      width: 100%;
      border: 2px dashed var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 32px 20px;
      text-align: center;
      color: var(--ink-muted);
      cursor: pointer;
    }

    .dropzone.dragover {
      border-color: var(--warm-grey-deep);
      background: var(--sand);
      color: var(--ink);
    }

    .dropzone input {
      display: none;
    }

    .dropzone-icon {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
      color: var(--ink-muted);
    }

    .dropzone-title {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink);
    }

    .dropzone-subtitle {
      display: block;
      margin-top: 4px;
      font-size: 0.8rem;
      color: var(--ink-muted);
    }

    .preview {
      margin-top: 12px;
      max-height: 220px;
      overflow: auto;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: #fff;
      font-size: 0.82rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bottom-tab-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      max-width: 520px;
      margin: 0 auto;
      height: calc(64px + env(safe-area-inset-bottom));
      padding: 0 env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      display: flex;
      background: var(--cream);
      border-top: 1px solid var(--border);
    }

    .bottom-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      text-decoration: none;
      color: #a89f94;
    }

    .bottom-tab.active {
      color: #1e1610;
    }

    .bottom-tab-pill {
      display: none;
      width: 20px;
      height: 3px;
      background: #c9a96e;
      border-radius: 2px;
      margin: 0 auto 6px;
    }

    .bottom-tab.active .bottom-tab-pill {
      display: block;
    }

    .bottom-tab-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .bottom-tab-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }

    .bottom-tab-icon svg {
      display: block;
      width: 24px;
      height: 24px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(84px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(12px);
      background: rgba(30, 22, 16, 0.92);
      color: var(--header-text);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.85rem;
      font-weight: 500;
      max-width: min(90%, 360px);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 50;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px var(--shadow-medium);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      color: var(--danger);
      border-color: #d4b8b0;
      background: rgba(250, 240, 238, 0.95);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <h1>Bennie</h1>
        <p>Dashboard</p>
      </div>
      <a class="header-link" href="index.html">← Chat</a>
    </header>

    <nav class="tabs" aria-label="Dashboard sections">
      <button type="button" class="tab active" data-tab="schedule">Schedule</button>
      <button type="button" class="tab" data-tab="history">History</button>
      <button type="button" class="tab" data-tab="upload">Upload</button>
    </nav>

    <div class="panels">
      <section class="panel active" id="panel-schedule" aria-labelledby="tab-schedule">
        <div class="panel-loading"><span class="spinner" aria-hidden="true"></span> Loading schedule…</div>
        <div class="panel-body" id="scheduleBody"></div>
      </section>

      <section class="panel" id="panel-history" aria-labelledby="tab-history">
        <div class="panel-loading"><span class="spinner" aria-hidden="true"></span> Loading history…</div>
        <div class="panel-body" id="historyBody"></div>
      </section>

      <section class="panel" id="panel-upload" aria-labelledby="tab-upload">
        <div class="panel-body upload-panel" id="uploadBody">
          <label class="dropzone" id="dropzone">
            <input type="file" id="fileInput" accept=".pdf,.xlsx,.xls,.csv,.txt,application/pdf,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv,text/plain" />
            <span class="dropzone-icon" aria-hidden="true">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </span>
            <span class="dropzone-title">Drop a plan file</span>
            <span class="dropzone-subtitle">PDF, Excel, CSV or plain text</span>
          </label>
          <p class="file-meta" id="fileMeta" hidden></p>
          <div class="preview" id="filePreview" hidden></div>
          <div>
            <label class="upload-label" for="uploadMessage">Message to Bennie</label>
            <textarea id="uploadMessage" class="upload-message" rows="4">Bennie, here's my new workout plan. Please parse this and load it into my schedule.</textarea>
          </div>
          <button type="button" class="send-to-bennie" id="sendToBennie">Send to Bennie</button>
        </div>
      </section>
    </div>
  </div>

  <nav class="bottom-tab-bar" aria-label="Main navigation">
    <a href="index.html" class="bottom-tab">
      <span class="bottom-tab-pill" aria-hidden="true"></span>
      <span class="bottom-tab-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/>
        </svg>
      </span>
      <span class="bottom-tab-label">Chat</span>
    </a>
    <a href="dashboard.html" class="bottom-tab active" aria-current="page">
      <span class="bottom-tab-pill" aria-hidden="true"></span>
      <span class="bottom-tab-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 20V10M12 20V4M6 20v-6"/>
        </svg>
      </span>
      <span class="bottom-tab-label">Dashboard</span>
    </a>
  </nav>

  <div class="toast" id="toast" role="status"></div>

  <script>

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatIsoDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function parseIsoDate(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function weekdayNameFromIso(iso) {
      const day = parseIsoDate(iso).getDay();
      return WEEKDAY_NAMES[day === 0 ? 6 : day - 1];
    }

    function defaultForIso(iso) {
      const day = parseIsoDate(iso).getDay();
      const index = day === 0 ? 6 : day - 1;
      return DEFAULT_PROGRAM[index];
    }

    function mondayOfWeek(date = new Date()) {
      const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const day = d.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      d.setDate(d.getDate() + diff);
      return d;
    }

    function addDays(date, days) {
      const d = new Date(date.getTime());
      d.setDate(d.getDate() + days);
      return d;
    }

    function formatDisplayDate(iso) {
      return parseIsoDate(iso).toLocaleDateString(undefined, {
        weekday: "short",
        month: "short",
        day: "numeric",
      });
    }

    function formatLoggedAt(value) {
      if (!value) return "—";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleString(undefined, {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
      });
    }

    function formatHistoryDayHeader(row) {
      const week = row.week != null && row.week !== "" ? ` · Week ${row.week}` : "";
      if (row.logged_at) {
        const d = new Date(row.logged_at);
        if (!Number.isNaN(d.getTime())) {
          return `${d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" })}${week}`;
        }
      }
      return `${row.day || "Workout"}${week}`;
    }

    function historyGroupKey(row) {
      if (row.logged_at) {
        const d = new Date(row.logged_at);
        if (!Number.isNaN(d.getTime())) {
          return `${formatIsoDate(d)}|${row.week ?? ""}`;
        }
      }
      return `${row.day || "unknown"}|${row.week ?? ""}`;
    }

    function historySortKey(row) {
      if (row.logged_at) {
        const t = new Date(row.logged_at).getTime();
        if (!Number.isNaN(t)) return t;
      }
      return 0;
    }

    function formatLogStats(row) {
      const parts = [];
      if (row.sets != null && row.reps) parts.push(`${row.sets} × ${row.reps}`);
      else if (row.sets != null) parts.push(`${row.sets} sets`);
      else if (row.reps) parts.push(`${row.reps}`);
      if (row.weight_lbs != null && row.weight_lbs !== "") parts.push(`${row.weight_lbs} lb`);
      return parts.join(" · ");
    }

    async function supabaseRequest(path, options = {}) {
      const headers = {
        apikey: SUPABASE_ANON,
        Authorization: `Bearer ${SUPABASE_ANON}`,
        ...(options.headers || {}),
      };
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers,
      });
      if (!res.ok) {
        const errText = await res.text().catch(() => "");
        throw new Error(errText || `Supabase error ${res.status}`);
      }
      if (res.status === 204) return null;
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }

      query.append("scheduled_date", `lte.${endIso}`);
      return supabaseRequest(`workout_schedule?${query.toString()}`);
    }

    function runExercisesFromCardio(cardio) {
      const text = String(cardio || "").trim();
      if (!text) return [];
      const parts = text.split("·").map((part) => part.trim());
      if (parts.length >= 2) {
        return [{ name: parts[0], sets: null, reps: parts.slice(1).join(" · "), weight: null }];
      }
      return [{ name: text, sets: null, reps: null, weight: null }];
    }

    function exercisesFromText(text) {
      const trimmed = String(text || "").trim();
      if (!trimmed) return [];
      return [{ name: trimmed, sets: null, reps: null, weight: null }];
    }

    function scheduleBlocksForDisplay(row, fallback) {
      if (!row) return fallback.blocks;

      const blocks = [];
      const workoutType = row.workout_type || fallback.workout_type || "";
      const strengthText =
        row.exercises != null && String(row.exercises).trim() !== ""
          ? String(row.exercises).trim()
          : "";

      if (workoutType || strengthText) {
        blocks.push({
          kind: "strength",
          title: workoutType || fallback.blocks.find((block) => block.kind === "strength")?.title || "",
          showLabel: true,
          exercises: strengthText ? exercisesFromText(strengthText) : [],
        });
      }

      const cardio =
        row.cardio != null && String(row.cardio).trim() !== "" ? String(row.cardio).trim() : "";
      if (cardio) {
        const runFallback = fallback.blocks.find((block) => block.kind === "run");
        blocks.push({
          kind: "run",
          title: runFallback?.title || "",
          showLabel: runFallback ? runFallback.showLabel : true,
          exercises: runExercisesFromCardio(cardio),
        });
      }

      if (!blocks.length) return fallback.blocks;
      return blocks;
    }

    async function loadSchedule() {
      setPanelLoading("schedule", true);
      try {
        const monday = mondayOfWeek();
        const sunday = addDays(monday, 6);
        const startIso = formatIsoDate(monday);
        const endIso = formatIsoDate(sunday);
        scheduleWeekLabel = { startIso, endIso };
        const rows = await fetchScheduleRange(startIso, endIso);
        const byDate = mapScheduleByDate(rows);
        scheduleDays = [];
        for (let i = 0; i < 7; i += 1) {
          const date = addDays(monday, i);
          const iso = formatIsoDate(date);
          const existing = byDate.get(iso);
          scheduleDays.push({
            iso,
            row: existing ? { ...existing, _editing: false } : null,
          });
        }
        renderSchedule();
      } catch (err) {
        scheduleBody.innerHTML = `<p class="empty">Could not load schedule.</p>`;
        showToast(String(err.message || err), true);
      } finally {
        setPanelLoading("schedule", false);
      }
    }

    function renderHistory() {
      const filtered = historyRows.filter((row) => {
        if (!historyFilter) return true;
        return String(row.exercise || "")
          .toLowerCase()
          .includes(historyFilter.toLowerCase());
      });

      const groups = new Map();
      filtered.forEach((row) => {
        const key = historyGroupKey(row);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(row);
      });

      const groupHtml = Array.from(groups.values())
        .sort((a, b) => historySortKey(b[0]) - historySortKey(a[0]))
        .map((rows) => {
          const header = formatHistoryDayHeader(rows[0]);
          return `
            <section class="history-group">
              <h3 class="history-day-header">${escapeHtml(header)}</h3>
              <div class="history-col-header">
                <span>Exercise</span>
                <span>Sets</span>
                <span>Reps</span>
                <span>Weight</span>
              </div>
              ${rows.map((row) => renderHistoryRow(row)).join("")}
            </section>
          `;
        })
        .join("");

      historyBody.innerHTML = `
        <div class="history-toolbar">
          <div class="field">
            <label for="historySearch">Filter by exercise</label>
            <input id="historySearch" class="search-input" type="search" placeholder="Search exercises…" value="${escapeHtml(historyFilter)}" />
          </div>
        </div>
        ${groupHtml || '<p class="empty">No workout logs yet.</p>'}
      `;
    }

        renderHistory();

    async function saveHistoryRow(id, card) {
      const payload = {
        exercise: card.querySelector('[data-field="exercise"]').value.trim(),
        sets: card.querySelector('[data-field="sets"]').value.trim(),
        reps: card.querySelector('[data-field="reps"]').value.trim(),
        weight_lbs: card.querySelector('[data-field="weight_lbs"]').value.trim(),
        notes: card.querySelector('[data-field="notes"]').value.trim(),
      };
      const sets = payload.sets === "" ? null : Number.parseInt(payload.sets, 10);
      const weight = payload.weight_lbs === "" ? null : Number(payload.weight_lbs);
      const body = {
        exercise: payload.exercise,
        sets: Number.isFinite(sets) ? sets : null,
        reps: payload.reps || null,
        weight_lbs: Number.isFinite(weight) ? weight : null,
        notes: payload.notes || null,
      };
      await supabaseRequest(`workout_logs?id=eq.${encodeURIComponent(id)}`, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          Prefer: "return=minimal",
        },
        body: JSON.stringify(body),
      });
      const row = historyRows.find((item) => String(item.id) === String(id));
      if (row) Object.assign(row, body, { _editing: false });
      renderHistory();
      showToast("Log updated.");
    }

          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            Prefer: "return=minimal",

          body: JSON.stringify(payload),
        });
      } else {
        await supabaseRequest("workout_schedule", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",

          body: JSON.stringify(payload),

          headers: { Prefer: "return=minimal" },
        });
      } else {
        await supabaseRequest(`workout_schedule?scheduled_date=eq.${encodeURIComponent(iso)}`, {
          method: "DELETE",
          headers: { Prefer: "return=minimal" },
        });
      }
      showToast("Reset to default program.");
      await loadSchedule();
    }

    function activateTab(name) {
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.tab === name));
      Object.entries(panels).forEach(([key, panel]) => {
        panel.classList.toggle("active", key === name);
      });
      if (name === "schedule") loadSchedule();
      if (name === "history") loadHistory();
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => activateTab(tab.dataset.tab));
    });

    historyBody.addEventListener("input", (event) => {
      if (event.target.id === "historySearch") {
        historyFilter = event.target.value;
        renderHistory();
      }
    });

    historyBody.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const card = button.closest(".history-row, .history-row-line");
      const id = card?.dataset.id;
      if (!id) return;

      if (button.dataset.action === "edit-log") {
        historyRows = historyRows.map((row) => ({
          ...row,
          _editing: String(row.id) === String(id),
        }));
        renderHistory();
        return;
      }

      if (button.dataset.action === "cancel-log") {
        historyRows = historyRows.map((row) => ({ ...row, _editing: false }));
        renderHistory();
        return;
      }

      if (button.dataset.action === "save-log") {
        button.disabled = true;
        try {
          await saveHistoryRow(id, card);
        } catch (err) {
          showToast(String(err.message || err), true);
        } finally {
          button.disabled = false;
        }
      }
    });

    scheduleBody.addEventListener("click", async (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const card = button.closest(".day-card");
      const iso = card?.dataset.date;
      if (!iso) return;
      const id = card.dataset.id || "";

      if (button.dataset.action === "edit-schedule") {
        scheduleDays = scheduleDays.map((entry) => {
          if (entry.iso !== iso) {
            if (entry.row) entry.row._editing = false;
            return entry;
          }
          const row = entry.row ? { ...entry.row } : { _editing: true };
          row._editing = true;
          return { iso, row };
        });
        renderSchedule();
        return;
      }

      if (button.dataset.action === "cancel-schedule") {
        scheduleDays = scheduleDays.map((entry) => {
          if (entry.row) entry.row._editing = false;
          return entry;
        });
        renderSchedule();
        return;
      }

      if (button.dataset.action === "save-schedule") {
        button.disabled = true;
        try {
          await saveScheduleCard(iso, card);
        } catch (err) {
          showToast(String(err.message || err), true);
        } finally {
          button.disabled = false;
        }
        return;
      }

      if (button.dataset.action === "reset-schedule") {
        button.disabled = true;
        try {
          await resetScheduleCard(iso, id);
        } catch (err) {
          showToast(String(err.message || err), true);
        } finally {
          button.disabled = false;
        }
      }
    });

    function formatFileSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function isTextLike(file) {
      const name = file.name.toLowerCase();
      return (
        file.type.startsWith("text/") ||
        name.endsWith(".csv") ||
        name.endsWith(".txt")
      );
    }

    function isSpreadsheetOrPdf(file) {
      const name = file.name.toLowerCase();
      return (
        name.endsWith(".pdf") ||
        name.endsWith(".xlsx") ||
        name.endsWith(".xls") ||
        file.type === "application/pdf" ||
        file.type.includes("spreadsheet") ||
        file.type.includes("excel")
      );
    }

    async function handleFile(file) {
      if (!file) return;
      fileMeta.hidden = false;
      fileMeta.textContent = `${file.name} · ${formatFileSize(file.size)}`;
      if (isTextLike(file)) {
        const preview = await file.text();
        uploadPreviewText = preview;
        filePreview.hidden = false;
        filePreview.textContent = preview;
        return;
      }
      uploadPreviewText = "";
      filePreview.hidden = true;
      filePreview.textContent = "";
    }

    dropzone.addEventListener("click", () => fileInput.click());
    dropzone.addEventListener("dragover", (event) => {
      event.preventDefault();
      dropzone.classList.add("dragover");
    });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
    dropzone.addEventListener("drop", async (event) => {
      event.preventDefault();
      dropzone.classList.remove("dragover");
      const file = event.dataTransfer?.files?.[0];
      await handleFile(file);
    });
    fileInput.addEventListener("change", async () => {
      await handleFile(fileInput.files?.[0]);
      fileInput.value = "";
    });

    document.getElementById("sendToBennie").addEventListener("click", () => {
      const base = uploadMessage.value.trim();
      if (!base) {
        showToast("Add a message for Bennie first.", true);
        return;
      }
      const parts = [base];
      if (uploadPreviewText) {
        parts.push("", "Uploaded plan content:", uploadPreviewText);
      }
      const message = parts.join("\n");
      localStorage.setItem(PENDING_MSG_KEY, message);
      const short = message.length <= 1200;
      window.location.href = short
        ? `index.html?msg=${encodeURIComponent(message)}`
        : "index.html";
    });

    const initialTab = window.location.hash.replace("#", "");
    if (initialTab && panels[initialTab]) {
      activateTab(initialTab);
    } else {
      loadSchedule();
    }
  </script>
</body>
</html>
